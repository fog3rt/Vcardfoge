<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fogert Milo | Digital Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            position: relative;
            /* Direct link to the photo provided */
            background: url('https://www.dropbox.com/scl/fi/otcwk1h8rp8ql2o04vk50/Photo-15.5.26-23-28-25.png?rlkey=y9l05ejyl2z9hi7ga9nxb7hmb&st=vpov8dot&raw=1') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Gradient mask for text legibility */
        .card-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, 
                rgba(0,0,0,0.95) 0%, 
                rgba(0,0,0,0.45) 40%, 
                transparent 85%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 30px;
            padding-bottom: 120px;
        }

        h1 {
            font-size: 3.2rem;
            text-transform: uppercase;
            line-height: 0.85;
            margin-bottom: 30px; /* Adjusted margin since job title is removed */
            font-weight: 800;
            letter-spacing: -1px;
        }

        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .action-btn {
            width: 52px; height: 52px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .action-btn:active { transform: scale(0.95); }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 22px;
        }

        .social-button {
            display: flex;
            align-items: center;
            background: white;
            color: black;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 14px;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            justify-content: center;
        }

        .social-button:last-child { margin-bottom: 0; }

        .bottom-nav {
            position: absolute;
            bottom: 35px;
            left: 20px;
            right: 20px;
            height: 68px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 3;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .primary-cta {
            flex-grow: 1;
            background: white;
            color: black;
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 800;
            margin: 0 10px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .nav-link { color: white; text-decoration: none; padding: 12px; font-size: 22px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="content">
            <h1>FOGERT<br>MILO</h1>
            
            <div class="quick-actions">
                <a href="tel:+355682063666" class="action-btn">📞</a>
                <a href="mailto:fogert.milo@avex-al.com" class="action-btn">✉️</a>
                <a href="https://wa.me/355682063666" class="action-btn">💬</a>
            </div>

            <div class="info-panel">
                <a href="https://www.facebook.com/Fog3rt?" target="_blank" class="social-button">Facebook</a>
                <a href="https://www.instagram.com/fog3rt?igsh=OHcyNjZyYXIxZDh0&utm_source=qr" target="_blank" class="social-button">Instagram</a>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="#" class="nav-link">▦</a>
            <a href="#" class="primary-cta">Add to Contact +</a>
            <a href="#" class="nav-link">📤</a>
        </div>
    </div>

</body>
</html>
